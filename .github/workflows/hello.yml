name: Hello World Workflow

on: [push]

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Say Hello
        run: echo "Hello World!"

      - name: Print date
        run: date

      - name: List directory contents
        run: ls -l

      - name: Force change
        run: echo "Updated workflow"
	
	name: Lint Workflow

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint