name: simple_deployment_pipeline

on:
  push:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm install
      - run: npm test
      - run: npm run build

  deploy:
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying app..."

  notify_success:
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - run: echo "Deployment Successful!"

  notify_failure:
    needs: [build_and_test, deploy]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - run: echo "Build Failed!"

  tag_release:
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - run: echo "Tag skipped"
