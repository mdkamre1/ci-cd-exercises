steps:
  - uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install dependencies
    run: npm install

  - name: Check style
    run: npm run eslint

  - name: Run tests
    run: npm test

  - name: Build project
    run: npm run build


  - name: Install Playwright Browsers
    run: npx playwright install --with-deps

  - name: Run Playwright tests
    run: npm run test:e2e