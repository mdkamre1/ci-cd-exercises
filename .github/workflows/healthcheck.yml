name: Periodic Health Check

on:
workflow_dispatch:
schedule:
- cron: '0 0 * * *'   # runs once per day

jobs:
health_check:
runs-on: ubuntu-latest

```
steps:
  - name: Check app health
    uses: jtalk/url-health-check-action@v4
    with:
      url:https://ci-cd-exercises.onrender.com
      max-attempts: 3
      retry-delay: 5s
```
