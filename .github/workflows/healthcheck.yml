name: Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest

    steps:
      - name: Check website health
        uses: jtalk/url-health-check-action@v3
        with:
          url: https://example.com   # change this
          max-attempts: 3
          retry-delay: 5s